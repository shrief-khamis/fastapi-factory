services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
    command: celery -A core.celery_app worker -l info

