# Merged into project docker-compose.yml (deep merge).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: myapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myapi"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "cd /app && alembic upgrade head && python scripts/seed_db.py"

  api:
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data: {}
