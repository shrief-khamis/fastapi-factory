name: api_key_identity_core
description: Adds API key identity core to the project
public: false

compatible_templates:
  - async_io_api
  - celery_job_api

requires_modules: []
conflicts_with: []

dependencies:
  python_packages:
    - sqlalchemy>=2.0.0
    - alembic>=1.13.0
    - asyncpg>=0.29.0
    - python-dotenv>=1.0.0
    - aiosqlite>=0.20.0
  env_vars:
    - name: DATABASE_URL
      value: "postgresql+asyncpg://postgres:postgres@db:5432/myapi"
    - name: API_KEY_SALT
      value: "dev-api-key-salt"
    - name: SEED_USER_ID
      value: "00000000-0000-0000-0000-000000000001"
    - name: SEED_USER_EMAIL
      value: "seed@example.com"
    - name: SEED_API_KEY_PLAINTEXT
      value: "seed-api-key-plaintext"

create_dirs:
  - src/db
  - scripts
  - alembic/versions

copy_files:
  - source: files/src/db/base.py
    destination: src/db/base.py
  - source: files/src/db/config.py
    destination: src/db/config.py
  - source: files/src/db/models.py
    destination: src/db/models.py
  - source: files/src/db/session.py
    destination: src/db/session.py
  - source: files/src/db/init_db.py
    destination: src/db/init_db.py
  - source: files/src/db/seed.py
    destination: src/db/seed.py
  - source: files/src/db/auth.py
    destination: src/db/auth.py
  - source: files/src/db/__init__.py
    destination: src/db/__init__.py
  - source: files/scripts/seed_db.py
    destination: scripts/seed_db.py
  - source: files/alembic.ini
    destination: alembic.ini
  - source: files/alembic/env.py
    destination: alembic/env.py
  - source: files/alembic/versions/0001_initial.py
    destination: alembic/versions/0001_initial.py