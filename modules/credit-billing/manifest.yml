name: credit_billing
description: Adds DB schema primitives for credit balances and ledger events
public: false

compatible_templates:
  - async_io_api
  - celery_job_api

requires_modules:
  - usage_metering
conflicts_with: []

create_dirs:
  - src/db
  - alembic/versions

copy_files:
  - source: files/src/db/credit_models.py
    destination: src/db/credit_models.py
  - source: files/alembic/versions/0001_initial.py
    destination: alembic/versions/0001_initial.py
    overwrite: true

patches:
  - strategy: file_append
    target: src/db/models.py
    source: patches/src/db/models.py.append.txt
